<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Subtle accent line -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accent)" opacity="0.6"/>

  <!-- Name -->
  <text x="450" y="90" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="#e6edf3" letter-spacing="2">
    Rayane Bourkaib
  </text>

  <!-- Subtitle -->
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e" letter-spacing="4">
    SYSTEMS PROGRAMMER · 42 PARIS
  </text>

  <!-- Tech line -->
  <text x="450" y="165" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff" letter-spacing="2" opacity="0.7">
    C · C++ · Python · Docker · Unix
  </text>
</svg>
